<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="rounded">
      <rect width="192" height="192" rx="38" fill="white"/>
    </mask>
  </defs>

  <!-- Fundo azul escuro -->
  <rect width="192" height="192" fill="#0A2540" mask="url(#rounded)"/>

  <!-- Sacola de compras branca -->
  <g transform="translate(0, 0)">
    <!-- Corpo da sacola -->
    <path d="M62 72 L70 144 L122 144 L130 72 Z" fill="white"/>

    <!-- Alça da sacola -->
    <path d="M77 72 C77 57 82 48 96 48 C110 48 115 57 115 72"
          stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Raio/flash verde -->
  <g transform="translate(96, 108)">
    <polygon points="0,-12 -6,4 6,4" fill="#00D4AA"/>
    <path d="M0,-12 L-4,2 M0,-12 L4,2" stroke="#00D4AA" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Brilho sutil -->
  <rect x="20" y="20" width="40" height="40" rx="10" fill="white" opacity="0.05"/>
  <rect x="132" y="132" width="30" height="30" rx="8" fill="white" opacity="0.03"/>
</svg>
